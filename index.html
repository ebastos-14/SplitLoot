<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Avas EB14</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0f1115;
    color:white;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:15px;
    color:#f0b90b;
}

.grid-top{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.grid-bottom{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:12px;
    margin-top:12px;
}

.card{
    background:#1a1d24;
    border-radius:12px;
    padding:15px;
}

.card h2{
    color:#f0b90b;
    margin-bottom:12px;
    font-size:18px;
}

.field{
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
}

input,
select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2a2e38;
    color:white;
    font-size:15px;
}

.radio-group{
    display:flex;
    gap:20px;
    margin-top:5px;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
}

.map-row{
    display:flex;
    gap:10px;
}

.map-row select{
    flex:1;
}

.map-row input{
    flex:1;
}

.total-pool{
    margin-top:15px;
    background:#252a34;
    padding:12px;
    border-radius:8px;
}

.total-pool-label{
    font-size:13px;
    opacity:.8;
}

.total-pool-value{
    font-size:24px;
    font-weight:bold;
    margin-top:4px;
}

.result-block{
    margin-bottom:20px;
}

.result-label{
    font-size:14px;
    opacity:.8;
}

.result-value{
    font-size:36px;
    font-weight:bold;
    margin-top:5px;
}

.actions{
    display:flex;
    flex-direction:column;
    gap:10px;
}

button{
    border:none;
    border-radius:8px;
    padding:12px;
    cursor:pointer;
    font-weight:bold;
    font-size:14px;
}

.copy-btn{
    background:#f0b90b;
    color:black;
}

.clear-btn{
    background:#c0392b;
    color:white;
}

.message{
    margin-top:12px;
    text-align:center;
    color:#2ecc71;
    min-height:20px;
}

.error{
    color:#ff6b6b;
    margin-top:10px;
}

@media(max-width:768px){

    .grid-top,
    .grid-bottom{
        grid-template-columns:1fr;
    }

    .result-value{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>Split Ava EB14</h1>

    <div class="grid-top">

        <!-- INGRESOS -->
        <div class="card">

            <h2>Total</h2>

            <div class="field">
                <label>Loot</label>
                <input type="text" id="lootTotal">
            </div>

            <div class="field">
                <label>Silver</label>
                <input type="text" id="silver">
            </div>

            <div class="field">
                <label>Descuento</label>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="tax" value="10">
                        10%
                    </label>

                    <label>
                        <input type="radio" name="tax" value="15" checked>
                        15%
                    </label>
                </div>
            </div>

            <div class="total-pool">
                <div class="total-pool-label">
                    Total Final
                </div>

                <div class="total-pool-value" id="totalPool">
                    0
                </div>
            </div>

        </div>

        <!-- PARTY -->
        <div class="card">

            <h2>Party y Mapa</h2>

            <div class="field">
                <label>Participantes</label>

                <select id="participants">
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11" selected>11</option>
                </select>
            </div>

            <div class="field">
                <label>Sancionados</label>

                <select id="halfPlayers"></select>
            </div>

            <div class="field">
                <label>Precio Mapa</label>

                <div class="map-row">

                    <select id="mapType">
                        <option value="0">No cobrar</option>
                        <option value="10000000">10M</option>
                        <option value="18000000">18M</option>
                        <option value="custom">Otro</option>
                    </select>
                
                    <input
                        type="text"
                        id="customMap"
                        placeholder="$0,0"
                        style="display:none;"
                    >
                
                </div>
            </div>

        </div>

    </div>

    <div class="grid-bottom">

        <!-- RESULTADOS -->
        <div class="card">

            <h2>Split</h2>

            <div class="result-block">

                <div class="result-label">
                    Split Normal
                </div>

                <div
                    class="result-value"
                    id="fullValue">
                    0
                </div>

            </div>

            <div
                class="result-block"
                id="halfResultBlock">
            
                <div class="result-label">
                    Split Sancionado
                </div>
            
                <div
                    class="result-value"
                    id="halfValue">
                    0
                </div>
            
            </div>

            <div
                class="error"
                id="errorBox">
            </div>

        </div>

        <!-- ACCIONES -->
        <div class="card">

            <h2>Coso Doble</h2>

            <div class="actions">

                <button
                    class="copy-btn"
                    id="copy100">
                    📈 Copiar
                </button>

                <button
                    class="copy-btn"
                    id="copy50">
                    📉 Copiar
                </button>

                <button
                    class="clear-btn"
                    id="clearBtn">
                    🗑️ Clins De Cal
                </button>

            </div>

            <div
                class="message"
                id="message">
            </div>

        </div>

    </div>

</div>

<script>

const STORAGE_KEY = "albionSplitCalculator";

const lootTotal = document.getElementById("lootTotal");
const silver = document.getElementById("silver");

const mapType = document.getElementById("mapType");
const customMap = document.getElementById("customMap");

const participants = document.getElementById("participants");
const halfPlayers = document.getElementById("halfPlayers");

const totalPoolElement =
    document.getElementById("totalPool");

const fullValue =
    document.getElementById("fullValue");

const halfValue =
    document.getElementById("halfValue");

const halfResultBlock =
    document.getElementById("halfResultBlock");

const errorBox =
    document.getElementById("errorBox");

const message =
    document.getElementById("message");

const copy50Button =
    document.getElementById("copy50");

function formatInputValue(value){

    const clean =
        String(value).replace(/\D/g,'');

    if(!clean) return '';

    return Number(clean)
        .toLocaleString('en-US');
}

function getNumericValue(value){

    return Number(
        String(value)
        .replace(/,/g,'')
    ) || 0;
}

function formatNumber(value){

    return Math.round(value)
        .toLocaleString('en-US');
}

function updateHalfPlayers(){

    const total =
        Number(participants.value);

    const current =
        halfPlayers.value;

    halfPlayers.innerHTML = '';

    for(let i=0;i<=total-1;i++){

        const option =
            document.createElement("option");

        option.value = i;
        option.textContent = i;

        halfPlayers.appendChild(option);
    }

    if(current <= total-1){

        halfPlayers.value = current;

    }
}

function calculate(){

    const loot =
        getNumericValue(
            lootTotal.value
        );

    const liquid =
        getNumericValue(
            silver.value
        );

    const tax =
        Number(
            document.querySelector(
                'input[name="tax"]:checked'
            ).value
        );

    let mapCost = 0;

    if(mapType.value === "custom"){

        mapCost =
            getNumericValue(
                customMap.value
            );

    }else{

        mapCost =
            Number(mapType.value);

    }

    const totalPlayers =
        Number(participants.value);

    const halfCount =
        Number(halfPlayers.value);

    if(halfCount === 0){
    
        halfResultBlock.style.display = "none";
        copy50Button.style.display = "none";
    
    }else{
    
        halfResultBlock.style.display = "block";
        copy50Button.style.display = "block";
    
    }

    const lootNet =
        loot * ((100 - tax) / 100);

    const totalPool =
        lootNet +
        liquid -
        mapCost;

    if(totalPool < 0){

        errorBox.textContent =
            "El total es negativo.";

        fullValue.textContent = "0";
        halfValue.textContent = "0";
        totalPoolElement.textContent = "0";

        return;
    }

    errorBox.textContent = "";

    const shares =
        (totalPlayers - halfCount) +
        (halfCount * 0.5);

    const pay100 =
        totalPool / shares;

    const pay50 =
        pay100 / 2;

    totalPoolElement.textContent =
        formatNumber(totalPool);

    fullValue.textContent =
        formatNumber(pay100);

    halfValue.textContent =
        formatNumber(pay50);

    fullValue.dataset.raw =
        Math.round(pay100);

    halfValue.dataset.raw =
        Math.round(pay50);

    saveData();
}

function saveData(){

    const data = {

        lootTotal:
            getNumericValue(
                lootTotal.value
            ),

        silver:
            getNumericValue(
                silver.value
            ),

        mapType:
            mapType.value,

        customMap:
            getNumericValue(
                customMap.value
            ),

        participants:
            participants.value,

        halfPlayers:
            halfPlayers.value,

        tax:
            document.querySelector(
                'input[name="tax"]:checked'
            ).value
    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );
}

function loadData(){

    const data = JSON.parse(
        localStorage.getItem(
            STORAGE_KEY
        )
    );

    if(!data) return;

    lootTotal.value =
        data.lootTotal
        ? formatInputValue(data.lootTotal)
        : "";

    silver.value =
        data.silver
        ? formatInputValue(data.silver)
        : "";

    customMap.value =
        data.customMap
        ? formatInputValue(data.customMap)
        : "";

    mapType.value =
        data.mapType || "0";
    toggleCustomMap();

    participants.value =
        data.participants || "11";

    updateHalfPlayers();

    halfPlayers.value =
        data.halfPlayers || "0";

    const radio =
        document.querySelector(
            `input[name="tax"][value="${data.tax || 15}"]`
        );

    if(radio){

        radio.checked = true;

    }
}

function copyValue(value){

    navigator.clipboard.writeText(
        String(value)
            .replace(/,/g,'')
            .replace(/\./g,'')
    );

    message.textContent =
        "✅ Copiado";

    setTimeout(()=>{

        message.textContent = "";

    },1500);
}

function toggleCustomMap(){

    if(mapType.value === "custom"){

        customMap.style.display = "block";

    }else{

        customMap.style.display = "none";
        customMap.value = "";

    }

}

[lootTotal,silver,customMap]
.forEach(input=>{

    input.addEventListener(
        "input",
        function(){

            const raw =
                this.value
                .replace(/\D/g,'');

            if(!raw){

                this.value = "";

                calculate();

                return;
            }

            this.value =
                Number(raw)
                .toLocaleString('en-US');

            calculate();
        }
    );

});

document
.getElementById("copy100")
.addEventListener("click",()=>{

    copyValue(
        fullValue.dataset.raw || 0
    );

});

document
.getElementById("copy50")
.addEventListener("click",()=>{

    copyValue(
        halfValue.dataset.raw || 0
    );

});

document
.getElementById("clearBtn")
.addEventListener("click",()=>{

    localStorage.removeItem(
        STORAGE_KEY
    );

    lootTotal.value = "";
    silver.value = "";
    customMap.value = "";

    mapType.value = "0";

    participants.value = "11";

    updateHalfPlayers();

    halfPlayers.value = "0";
    
    halfResultBlock.style.display = "none";
    copy50Button.style.display = "none";

    document.querySelector(
        'input[name="tax"][value="15"]'
    ).checked = true;

    toggleCustomMap();

    calculate();
});

participants.addEventListener(
    "change",
    ()=>{

        updateHalfPlayers();

        calculate();
    }
);

halfPlayers.addEventListener(
    "change",
    calculate
);

mapType.addEventListener(
    "change",
    ()=>{

        toggleCustomMap();
        calculate();

    }
);

document
.querySelectorAll(
    'input[name="tax"]'
)
.forEach(element=>{

    element.addEventListener(
        "change",
        calculate
    );

});

updateHalfPlayers();
loadData();

toggleCustomMap();
    
calculate();

</script>

</body>
</html>
