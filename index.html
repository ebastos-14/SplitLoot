<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Split Albion</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0f1115;
    color:#fff;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#1a1d24;
    border-radius:12px;
    padding:20px;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:15px;
    color:#f0b90b;
}

.field{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
}

input,
select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#2a2e38;
    color:white;
    font-size:16px;
}

.radio-group{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.radio-group label{
    display:flex;
    align-items:center;
    gap:5px;
    cursor:pointer;
}

.result{
    background:#252a34;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
}

.result-title{
    font-size:14px;
    opacity:.8;
}

.result-value{
    font-size:32px;
    font-weight:bold;
    margin-top:5px;
}

.buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    border:none;
    border-radius:8px;
    padding:12px 16px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    opacity:.9;
}

.copy-btn{
    background:#f0b90b;
    color:black;
    flex:1;
}

.clear-btn{
    background:#c0392b;
    color:white;
    width:100%;
    margin-top:15px;
}

.info{
    background:#252a34;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}

.info span{
    font-weight:bold;
}

.success{
    color:#2ecc71;
    margin-top:10px;
    text-align:center;
}

.error{
    color:#ff5a5a;
    margin-top:10px;
    text-align:center;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<div class="container">

    <h1>💰 Calculadora Split Albion</h1>

    <div class="card">

        <h2>Loot</h2>

        <div class="field">
            <label>Loot Total</label>
            <input type="text" id="lootTotal" inputmode="numeric">
        </div>

        <div class="field">
            <label>Plata Líquida</label>
            <input type="text" id="silver" inputmode="numeric">
        </div>

        <div class="field">
            <label>Reventa</label>

            <div class="radio-group">
                <label>
                    <input type="radio" name="tax" value="10">
                    10%
                </label>

                <label>
                    <input type="radio" name="tax" value="15" checked>
                    15%
                </label>
            </div>

        </div>

    </div>

    <div class="card">

        <h2>Mapa</h2>

        <div class="field">

            <select id="mapType">
                <option value="0">No cobrar mapa</option>
                <option value="10000000">10M</option>
                <option value="18000000">18M</option>
                <option value="custom">Custom</option>
            </select>

        </div>

        <div class="field hidden" id="customMapContainer">

            <label>Valor Custom</label>
            <input type="text" id="customMap" inputmode="numeric">

        </div>

    </div>

    <div class="card">

        <h2>Grupo</h2>

        <div class="field">

            <label>Participantes</label>

            <select id="participants">
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11" selected>11</option>
            </select>

        </div>

        <div class="field">

            <label>Jugadores al 50%</label>

            <select id="halfPlayers"></select>

        </div>

    </div>

    <div class="card">

        <h2>Resumen</h2>

        <div class="info">
            Total a repartir:
            <span id="totalPool">0</span>
        </div>

        <div class="info">
            Participaciones:
            <span id="shares">0</span>
        </div>

    </div>

    <div class="card">

        <h2>Resultados</h2>

        <div id="errorBox" class="error hidden"></div>

        <div class="result">
            <div class="result-title">Pago 100%</div>
            <div id="fullValue" class="result-value">0</div>
        </div>

        <div class="buttons">
            <button class="copy-btn" id="copy100">
                📋 Copiar 100%
            </button>
        </div>

        <br>

        <div class="result">
            <div class="result-title">Pago 50%</div>
            <div id="halfValue" class="result-value">0</div>
        </div>

        <div class="buttons">
            <button class="copy-btn" id="copy50">
                📋 Copiar 50%
            </button>
        </div>

        <div id="message" class="success"></div>

        <button class="clear-btn" id="clearBtn">
            🗑️ Limpiar Todo
        </button>

    </div>

</div>

<script>

const STORAGE_KEY = "albionSplitCalculator";

const lootTotal = document.getElementById("lootTotal");
const silver = document.getElementById("silver");

const mapType = document.getElementById("mapType");
const customMap = document.getElementById("customMap");
const customMapContainer = document.getElementById("customMapContainer");

const participants = document.getElementById("participants");
const halfPlayers = document.getElementById("halfPlayers");

const totalPoolElement = document.getElementById("totalPool");
const sharesElement = document.getElementById("shares");

const fullValue = document.getElementById("fullValue");
const halfValue = document.getElementById("halfValue");

const errorBox = document.getElementById("errorBox");
const message = document.getElementById("message");

function formatInputValue(value){

    const numbers = String(value).replace(/\D/g,'');

    if(!numbers) return '';

    return Number(numbers).toLocaleString('en-US');

}

function getNumericValue(value){

    return Number(
        String(value).replace(/,/g,'')
    ) || 0;

}

function formatResult(value){

    return Math.round(value)
        .toLocaleString('en-US');

}

function saveData(){

    const data = {

        lootTotal: getNumericValue(lootTotal.value),
        silver: getNumericValue(silver.value),

        mapType: mapType.value,

        customMap: getNumericValue(customMap.value),

        participants: participants.value,
        halfPlayers: halfPlayers.value,

        tax: document.querySelector(
            'input[name="tax"]:checked'
        ).value

    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );

}

function loadData(){

    const data = JSON.parse(
        localStorage.getItem(STORAGE_KEY)
    );

    if(!data) return;

    lootTotal.value = data.lootTotal
        ? formatInputValue(data.lootTotal)
        : '';

    silver.value = data.silver
        ? formatInputValue(data.silver)
        : '';

    customMap.value = data.customMap
        ? formatInputValue(data.customMap)
        : '';

    mapType.value = data.mapType || '0';

    participants.value = data.participants || '11';

    updateHalfPlayers();

    halfPlayers.value = data.halfPlayers || '0';

    const taxRadio = document.querySelector(
        `input[name="tax"][value="${data.tax || '15'}"]`
    );

    if(taxRadio){
        taxRadio.checked = true;
    }

    toggleCustom();

}

function updateHalfPlayers(){

    const total = Number(
        participants.value
    );

    const current = halfPlayers.value;

    halfPlayers.innerHTML = '';

    for(let i = 0; i <= total - 1; i++){

        const option =
            document.createElement('option');

        option.value = i;
        option.textContent = i;

        halfPlayers.appendChild(option);

    }

    if(current <= total - 1){
        halfPlayers.value = current;
    }

}

function toggleCustom(){

    customMapContainer.classList.toggle(
        'hidden',
        mapType.value !== 'custom'
    );

}

function calculate(){

    const loot =
        getNumericValue(
            lootTotal.value
        );

    const liquid =
        getNumericValue(
            silver.value
        );

    const tax = Number(
        document.querySelector(
            'input[name="tax"]:checked'
        ).value
    );

    let mapCost = 0;

    if(mapType.value === 'custom'){

        mapCost =
            getNumericValue(
                customMap.value
            );

    }
    else{

        mapCost =
            Number(mapType.value);

    }

    const totalPlayers =
        Number(participants.value);

    const halfCount =
        Number(halfPlayers.value);

    const lootNet =
        loot * ((100 - tax) / 100);

    const totalPool =
        lootNet +
        liquid -
        mapCost;

    if(totalPool < 0){

        errorBox.classList.remove('hidden');

        errorBox.textContent =
            'El total a repartir es negativo.';

        fullValue.textContent = '0';
        halfValue.textContent = '0';

        totalPoolElement.textContent = '0';

        return;

    }

    errorBox.classList.add('hidden');

    const shares =
        (totalPlayers - halfCount) +
        (halfCount * 0.5);

    const pay100 =
        totalPool / shares;

    const pay50 =
        pay100 / 2;

    totalPoolElement.textContent =
        formatResult(totalPool);

    sharesElement.textContent =
        shares;

    fullValue.textContent =
        formatResult(pay100);

    halfValue.textContent =
        formatResult(pay50);

    fullValue.dataset.raw =
        Math.round(pay100);

    halfValue.dataset.raw =
        Math.round(pay50);

    saveData();

}

function copyValue(value){

    navigator.clipboard.writeText(
        String(value)
            .replace(/,/g,'')
            .replace(/\./g,'')
    );

    message.textContent =
        '✅ Copiado al portapapeles';

    setTimeout(() => {

        message.textContent = '';

    }, 1500);

}

const formattedInputs = [
    lootTotal,
    silver,
    customMap
];

formattedInputs.forEach(input => {

    input.addEventListener(
        'input',
        function(){

            const raw =
                this.value.replace(/\D/g,'');

            if(!raw){

                this.value = '';

                calculate();

                return;

            }

            this.value =
                Number(raw)
                .toLocaleString('en-US');

            calculate();

        }
    );

});

document.getElementById('copy100')
.addEventListener('click', () => {

    copyValue(
        fullValue.dataset.raw || 0
    );

});

document.getElementById('copy50')
.addEventListener('click', () => {

    copyValue(
        halfValue.dataset.raw || 0
    );

});

document.getElementById('clearBtn')
.addEventListener('click', () => {

    localStorage.removeItem(
        STORAGE_KEY
    );

    lootTotal.value = '';
    silver.value = '';
    customMap.value = '';

    mapType.value = '0';

    participants.value = '11';

    updateHalfPlayers();

    halfPlayers.value = '0';

    document.querySelector(
        'input[name="tax"][value="15"]'
    ).checked = true;

    toggleCustom();

    calculate();

});

[
    mapType,
    participants,
    halfPlayers
].forEach(element => {

    element.addEventListener(
        'change',
        calculate
    );

});

document.querySelectorAll(
    'input[name="tax"]'
).forEach(element => {

    element.addEventListener(
        'change',
        calculate
    );

});

participants.addEventListener(
    'change',
    () => {

        updateHalfPlayers();

        calculate();

    }
);

mapType.addEventListener(
    'change',
    () => {

        toggleCustom();

        calculate();

    }
);

updateHalfPlayers();
loadData();
calculate();

</script>

</body>
</html>
